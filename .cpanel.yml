---
deployment:
  tasks:
    - export DEPLOYPATH=/home/jywxwido/heartconnect.ruwarehabcentre.com
    - echo "Checking environment..."
    - node -v
    - npm -v
    - echo "Starting deployment..."
    - /bin/cp -R . $DEPLOYPATH
    - cd $DEPLOYPATH
    - echo "Installing dependencies..."
    - npm install
    - echo "Building application..."
    - npm run build
    - mkdir -p tmp
    - touch tmp/restart.txt
