<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEART CONNECT</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="debug-msg" style="position: fixed; top: 0; left: 0; background: red; color: white; padding: 10px; z-index: 9999; max-width: 100%; word-break: break-all;">
      If you see this, index.html is loading. 
      <div id="error-display" style="margin-top: 5px; font-family: monospace; font-size: 12px;">Waiting for JS...</div>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('error-display').innerText = 'Error: ' + msg + '\nAt: ' + url + ':' + line + ':' + col;
        return false;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('error-display').innerText = 'Unhandled Rejection: ' + event.reason;
      };
      console.log('Debug script in index.html is running');
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
